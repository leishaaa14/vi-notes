<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vi-Notes — Paste Detection Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; padding: 40px 20px; }
    .wrapper { max-width: 760px; margin: 0 auto; }
    header { margin-bottom: 28px; }
    header h1 { font-size: 22px; font-weight: 600; color: #f8fafc; }
    header p { font-size: 13px; color: #64748b; margin-top: 4px; }
    .module-badge { display: inline-block; background: #1e3a5f; color: #60a5fa; font-size: 11px; font-family: monospace; padding: 3px 10px; border-radius: 4px; margin-top: 8px; }
    .editor-box { background: #1e2130; border: 1px solid #2d3148; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
    .editor-topbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; background: #181b2e; border-bottom: 1px solid #2d3148; }
    .editor-topbar span { font-size: 12px; color: #475569; font-family: monospace; }
    .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #475569; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; }
    #editor { width: 100%; height: 200px; padding: 18px; background: transparent; border: none; outline: none; resize: none; font-size: 15px; line-height: 1.7; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
    #editor::placeholder { color: #374151; }
    .flash { animation: flashbg 0.7s ease-out; }
    @keyframes flashbg { 0% { background: #2d1f0a; } 100% { background: transparent; } }
    .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
    .metric { background: #1e2130; border: 1px solid #2d3148; border-radius: 10px; padding: 14px 16px; }
    .metric-label { font-size: 11px; color: #475569; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; font-family: monospace; }
    .metric-value { font-size: 28px; font-weight: 600; color: #f1f5f9; }
    .metric-value.warn { color: #f59e0b; }
    .metric-value.danger { color: #ef4444; }
    .auth-bar-wrap { background: #1e2130; border: 1px solid #2d3148; border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; }
    .auth-bar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .auth-bar-header span:first-child { font-size: 11px; color: #475569; text-transform: uppercase; letter-spacing: 0.07em; font-family: monospace; }
    #auth-pct { font-size: 14px; font-weight: 600; color: #22c55e; }
    .bar-bg { height: 6px; background: #2d3148; border-radius: 3px; overflow: hidden; }
    #auth-fill { height: 100%; width: 100%; border-radius: 3px; background: #22c55e; transition: width 0.4s ease, background 0.4s ease; }
    .log-box { background: #1e2130; border: 1px solid #2d3148; border-radius: 10px; overflow: hidden; }
    .log-header { padding: 10px 16px; border-bottom: 1px solid #2d3148; font-size: 11px; color: #475569; text-transform: uppercase; letter-spacing: 0.07em; font-family: monospace; background: #181b2e; }
    .log-body { max-height: 200px; overflow-y: auto; }
    .log-empty { padding: 24px; text-align: center; color: #374151; font-size: 13px; }
    .log-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 16px; border-bottom: 1px solid #1a1d2e; font-size: 13px; }
    .log-item:hover { background: #181b2e; }
    .log-time { font-family: monospace; font-size: 11px; color: #334155; padding-top: 2px; min-width: 62px; }
    .badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-family: monospace; white-space: nowrap; font-weight: 600; }
    .badge-paste { background: #3b0f0f; color: #f87171; }
    .log-detail { color: #475569; font-size: 12px; }
  </style>
</head>
<body>
<div class="wrapper">
  <header>
    <h1>Vi-Notes — Paste Detection</h1>
    <p>Feature #4 demo · Type normally or paste text to see detection in action</p>
    <span class="module-badge">using dist/pasteDetector.js</span>
  </header>

  <div class="editor-box">
    <div class="editor-topbar">
      <span>session_001.txt</span>
      <span class="status"><span class="dot"></span>monitoring</span>
    </div>
    <textarea id="editor" placeholder="Start writing here... then try pasting some text with Ctrl+V"></textarea>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">Keystrokes</div>
      <div class="metric-value" id="keystrokes">0</div>
    </div>
    <div class="metric">
      <div class="metric-label">Paste Events</div>
      <div class="metric-value" id="paste-count">0</div>
    </div>
    <div class="metric">
      <div class="metric-label">Pasted Chars</div>
      <div class="metric-value" id="pasted-chars">0</div>
    </div>
  </div>

  <div class="auth-bar-wrap">
    <div class="auth-bar-header">
      <span>Typed Authenticity</span>
      <span id="auth-pct">100%</span>
    </div>
    <div class="bar-bg">
      <div id="auth-fill"></div>
    </div>
  </div>

  <div class="log-box">
    <div class="log-header">event log</div>
    <div class="log-body" id="log-body">
      <div class="log-empty" id="log-empty">No events yet — start typing or paste to see activity.</div>
    </div>
  </div>
</div>

<script type="module">
  import { createPasteDetector, buildPasteSummary } from './dist/pasteDetector.js';

  const editor        = document.getElementById('editor');
  const keystrokesEl  = document.getElementById('keystrokes');
  const pasteCountEl  = document.getElementById('paste-count');
  const pastedCharsEl = document.getElementById('pasted-chars');
  const authPct       = document.getElementById('auth-pct');
  const authFill      = document.getElementById('auth-fill');
  const logBody       = document.getElementById('log-body');

  let keystrokes = 0, typedChars = 0;

  const detector = createPasteDetector(editor, {
    onPaste: (event) => {
      pasteCountEl.textContent  = event.sessionPasteCount;
      pastedCharsEl.textContent = event.sessionPastedChars;
      pasteCountEl.className    = 'metric-value' + (event.sessionPasteCount >= 3 ? ' danger' : ' warn');

      editor.classList.add('flash');
      setTimeout(() => editor.classList.remove('flash'), 700);

      addLog(event);
      updateAuth(event.sessionPastedChars);

      const summary = buildPasteSummary(detector, editor.value.length);
      console.log('[vi-notes] paste event:', event);
      console.log('[vi-notes] session summary:', summary);
    }
  });

  function updateAuth(pastedTotal) {
    const total = typedChars + pastedTotal;
    const pct   = total === 0 ? 100 : Math.round((typedChars / total) * 100);
    authPct.textContent       = pct + '%';
    authFill.style.width      = pct + '%';
    authFill.style.background = pct >= 85 ? '#22c55e' : pct >= 60 ? '#f59e0b' : '#ef4444';
    authPct.style.color       = pct >= 85 ? '#22c55e' : pct >= 60 ? '#f59e0b' : '#ef4444';
  }

  function addLog(event) {
    const empty = document.getElementById('log-empty');
    if (empty) empty.remove();
    const preview = (event.pastedLength > 50
      ? event.pastedPreview.slice(0, 50) + '...'
      : event.pastedPreview).replace(/\n/g, ' ');
    const item = document.createElement('div');
    item.className = 'log-item';
    item.innerHTML = `
      <span class="log-time">${new Date(event.timestamp).toTimeString().slice(0,8)}</span>
      <span class="badge badge-paste">paste</span>
      <span class="log-detail">${event.pastedLength} chars — "${preview}"</span>
    `;
    logBody.prepend(item);
  }

  editor.addEventListener('keydown', (e) => {
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    if (e.key.length === 1 || e.key === 'Enter') {
      keystrokes++;
      typedChars++;
      keystrokesEl.textContent = keystrokes;
      updateAuth(detector.events.reduce((s, ev) => s + ev.pastedLength, 0));
    }
  });
</script>
</body>
</html>
